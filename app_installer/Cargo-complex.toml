[package]
name = "zhtp-installer"
version = "1.0.0"
description = "ZHTP Network - One-Click Installer & Node Manager"
authors = ["ZHTP Team"]
edition = "2021"

[dependencies]
tauri = { version = "1.0", features = ["shell-open", "fs-all", "process-all"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
reqwest = { version = "0.11", features = ["json"] }
uuid = { version = "1.0", features = ["v4"] }
ed25519-dalek = "1.0"
rand = "0.8"
sha2 = "0.10"
hex = "0.4"
dirs = "4.0"
num_cpus = "1.0"
sysinfo = "0.29"
base64 = "0.21"

[build-dependencies]
tauri-build = { version = "1.0", features = [] }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]

[[bin]]
name = "zhtp-installer"
path = "src/main.rs"
